services:
  db:
    image: postgres:16-alpine
    container_name: dadjokes-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: dadjokes
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: dadjokes
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dadjokes"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: dadjokes-api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: dadjokes
      DB_NAME: dadjokes
      DB_PASSWORD_FILE: /run/secrets/db_password

      SMTP_HOST: mailpit
      SMTP_PORT: 1025

    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

    develop:
      watch:
        - path: ./api/src
          target: /app/src
          action: sync
        - path: ./api/package.json
          action: rebuild

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: dadjokes-frontend
    ports:
      - "8080:5173"
    depends_on:
      - api
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    develop:
      watch:
        - path: ./frontend/src
          target: /app/src
          action: sync
        - path: ./frontend/package*.json
          target: /app/package*.json
          action: rebuild

  mailpit:
    image: axllent/mailpit
    container_name: dadjokes-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  pgdata:

secrets:
  db_password:
    file: ./secrets/db_password.txt